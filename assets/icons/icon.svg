<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <title>Neural Network Favicon</title>
  
  <!-- Connections: Input to Hidden -->
  <path d="M20,35 L50,20 M20,35 L50,50 M20,35 L50,80 M20,65 L50,20 M20,65 L50,50 M20,65 L50,80" 
        stroke="#6366f1" stroke-width="5" stroke-linecap="round"/>
        
  <!-- Connections: Hidden to Output -->
  <path d="M50,20 L80,35 M50,20 L80,65 M50,50 L80,35 M50,50 L80,65 M50,80 L80,35 M50,80 L80,65" 
        stroke="#a855f7" stroke-width="5" stroke-linecap="round"/>

  <!-- Input Layer Nodes (Indigo) -->
  <circle cx="20" cy="35" r="8" fill="#ffffff" stroke="#6366f1" stroke-width="5"/>
  <circle cx="20" cy="65" r="8" fill="#ffffff" stroke="#6366f1" stroke-width="5"/>

  <!-- Hidden Layer Nodes (Violet) -->
  <circle cx="50" cy="20" r="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="5"/>
  <circle cx="50" cy="50" r="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="5"/>
  <circle cx="50" cy="80" r="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="5"/>

  <!-- Output Layer Nodes (Purple) -->
  <circle cx="80" cy="35" r="8" fill="#ffffff" stroke="#a855f7" stroke-width="5"/>
  <circle cx="80" cy="65" r="8" fill="#ffffff" stroke="#a855f7" stroke-width="5"/>
</svg>
